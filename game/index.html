<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ocean Catcher</title>
    <style>
      :root {
        --bg: #071a2b;
        --panel: rgba(255, 255, 255, 0.15);
        --text: #f5fcff;
        --accent: #7be4ff;
        --accent-2: #2f8ec7;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, #06111d, #113a5a 45%, #2d7fa8);
      }

      .wrap {
        width: min(94vw, 760px);
        padding: 1.2rem;
        border-radius: 24px;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(16px);
        box-shadow: 0 18px 50px rgba(0,0,0,0.24);
        border: 1px solid rgba(255,255,255,0.18);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 0.8rem;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.3rem, 2.4vw, 1.7rem);
      }

      .stats {
        display: flex;
        gap: 0.7rem;
        flex-wrap: wrap;
      }

      .chip {
        padding: 0.45rem 0.7rem;
        border-radius: 999px;
        background: rgba(255,255,255,0.16);
        font-size: 0.95rem;
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 18px;
        background: linear-gradient(to bottom, #123b59, #0a2235);
        border: 2px solid rgba(255,255,255,0.2);
      }

      .hint {
        margin-top: 0.8rem;
        font-size: 0.95rem;
        color: rgba(245,252,255,0.85);
      }

      .button {
        margin-top: 0.8rem;
        padding: 0.7rem 1rem;
        border: none;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      .button:hover { transform: translateY(-1px); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <h1>🌊 Ocean Catcher</h1>
        <div class="stats">
          <div class="chip" id="score">Score: 0</div>
          <div class="chip" id="lives">Lives: 3</div>
          <div class="chip">Use ← → or A/D</div>
        </div>
      </div>
      <canvas id="game" width="720" height="420"></canvas>
      <div class="hint">Catch the marlin, dodge the sharks, and survive as long as you can.</div>
      <button class="button" id="restart">Restart Game</button>
    </div>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const livesEl = document.getElementById('lives');
      const restartBtn = document.getElementById('restart');

      const W = canvas.width;
      const H = canvas.height;
      let score = 0;
      let lives = 3;
      let running = true;

      const keys = {};
      const marlin = [];
      const sharks = [];
      const particles = [];

      const player = {
        x: W / 2,
        y: H - 48,
        w: 44,
        h: 28,
        speed: 5.2
      };

      function resetGame() {
        score = 0;
        lives = 3;
        running = true;
        marlin.length = 0;
        sharks.length = 0;
        particles.length = 0;
        player.x = W / 2;
        updateHud();
      }

      function updateHud() {
        scoreEl.textContent = `Score: ${score}`;
        livesEl.textContent = `Lives: ${lives}`;
      }

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function spawnItem() {
        if (Math.random() < 0.7) {
          marlin.push({
            x: random(20, W - 20),
            y: -20,
            w: 32,
            h: 16,
            vy: random(2.2, 3.8),
            sway: random(-0.8, 0.8)
          });
        } else {
          sharks.push({
            x: random(20, W - 20),
            y: -20,
            w: 36,
            h: 16,
            vy: random(2.1, 3.5),
            sway: random(-0.8, 0.8)
          });
        }
      }

      function spawnParticles(x, y, color) {
        for (let i = 0; i < 7; i++) {
          particles.push({
            x,
            y,
            vx: random(-2.2, 2.2),
            vy: random(-1.8, 1.2),
            life: 25,
            color
          });
        }
      }

      function drawBackground() {
        ctx.clearRect(0, 0, W, H);
        const gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, '#113b5a');
        gradient.addColorStop(1, '#071a2b');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        for (let i = 0; i < 8; i++) {
          const y = (i * 60) + (Date.now() / 60) % 60;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.quadraticCurveTo(W / 4, y - 24, W / 2, y);
          ctx.quadraticCurveTo((3 * W) / 4, y + 24, W, y);
          ctx.lineTo(W, H);
          ctx.lineTo(0, H);
          ctx.closePath();
          ctx.fill();
        }
      }

      function drawPlayer() {
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.fillStyle = '#f4fbff';
        ctx.beginPath();
        ctx.moveTo(0, -14);
        ctx.lineTo(22, 14);
        ctx.lineTo(0, 10);
        ctx.lineTo(-22, 14);
        ctx.closePath();
        ctx.fill();
        ctx.fillRect(-10, 8, 20, 8);
        ctx.restore();
      }

      function drawItems() {
        marlin.forEach((m) => {
          ctx.save();
          ctx.translate(m.x, m.y);
          ctx.scale(1, 1);
          ctx.fillStyle = '#2ec4b6';
          ctx.beginPath();
          ctx.moveTo(0, -8);
          ctx.lineTo(18, -4);
          ctx.lineTo(30, 0);
          ctx.lineTo(18, 4);
          ctx.lineTo(0, 8);
          ctx.lineTo(-10, 4);
          ctx.lineTo(-20, 2);
          ctx.lineTo(-24, 0);
          ctx.lineTo(-20, -2);
          ctx.lineTo(-10, -4);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.fillRect(10, -2, 6, 4);
          ctx.restore();
        });

        sharks.forEach((s) => {
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.fillStyle = '#4b5563';
          ctx.beginPath();
          ctx.moveTo(0, -8);
          ctx.lineTo(22, -2);
          ctx.lineTo(30, 0);
          ctx.lineTo(22, 2);
          ctx.lineTo(0, 8);
          ctx.lineTo(-16, 4);
          ctx.lineTo(-24, 0);
          ctx.lineTo(-16, -4);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.fillRect(8, -2, 6, 4);
          ctx.restore();
        });
      }

      function drawParticles() {
        particles.forEach((p) => {
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life / 25;
          ctx.fillRect(p.x, p.y, 3, 3);
          ctx.globalAlpha = 1;
        });
      }

      function update() {
        if (!running) return;

        if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;
        player.x = Math.max(24, Math.min(W - 24, player.x));

        if (Math.random() < 0.02) spawnItem();

        marlin.forEach((m, i) => {
          m.y += m.vy;
          m.x += Math.sin((Date.now() / 260) + i) * 0.45 + m.sway;
          if (m.y > H + 20) marlin.splice(i, 1);
          else if (Math.abs(m.x - player.x) < 24 && Math.abs(m.y - player.y) < 20) {
            score += 10;
            spawnParticles(m.x, m.y, '#7cf0d0');
            marlin.splice(i, 1);
            updateHud();
          }
        });

        sharks.forEach((s, i) => {
          s.y += s.vy;
          s.x += Math.sin((Date.now() / 280) + i * 0.6) * 0.35 + s.sway;
          if (s.y > H + 20) sharks.splice(i, 1);
          else if (Math.abs(s.x - player.x) < 24 && Math.abs(s.y - player.y) < 20) {
            lives -= 1;
            spawnParticles(s.x, s.y, '#ff6b6b');
            sharks.splice(i, 1);
            updateHud();
            if (lives <= 0) {
              running = false;
            }
          }
        });

        particles.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 1;
          if (p.life <= 0) particles.splice(i, 1);
        });

        drawBackground();
        drawParticles();
        drawItems();
        drawPlayer();

        if (!running) {
          ctx.fillStyle = 'rgba(0,0,0,0.55)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 34px Segoe UI';
          ctx.textAlign = 'center';
          ctx.fillText('Game Over', W / 2, H / 2 - 10);
          ctx.font = '20px Segoe UI';
          ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 24);
          ctx.fillText('Press Restart to play again', W / 2, H / 2 + 54);
        }

        requestAnimationFrame(update);
      }

      window.addEventListener('keydown', (e) => {
        keys[e.key] = true;
      });

      window.addEventListener('keyup', (e) => {
        keys[e.key] = false;
      });

      restartBtn.addEventListener('click', resetGame);
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !running) resetGame();
      });

      resetGame();
      update();
    </script>
  </body>
</html>
