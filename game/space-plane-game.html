<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Airplane</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #02030a;
        color: white;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle at top, #1a2858 0%, #05070d 70%);
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .panel {
        margin: 16px;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(7, 10, 20, 0.72);
        border: 1px solid rgba(255,255,255,0.16);
        box-shadow: 0 8px 22px rgba(0,0,0,0.28);
        max-width: 320px;
      }
      h1 { margin: 0 0 6px; font-size: 20px; }
      p { margin: 3px 0; font-size: 13px; color: #e6f3ff; }
      #bottom { align-self: flex-end; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">
      <div class="panel">
        <h1>Cosmic Airplane</h1>
        <p>Fly through the nebula with the arrow keys or A/D.</p>
        <p>Collect stars and avoid the asteroids.</p>
      </div>
      <div id="bottom" class="panel">
        <p id="status">Score: 0</p>
        <p id="tip">Stay sharp and keep your ship steady.</p>
      </div>
    </div>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const statusEl = document.getElementById('status');
      const tipEl = document.getElementById('tip');

      const dpr = window.devicePixelRatio || 1;
      function resize() {
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      window.addEventListener('resize', resize);

      const keys = {};
      window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
      window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

      const game = {
        width: window.innerWidth,
        height: window.innerHeight,
        player: { x: 0, y: 0, speed: 0, maxSpeed: 320, health: 100 },
        stars: [],
        obstacles: [],
        score: 0,
        time: 0,
        spawnTimer: 0,
        cameraZ: 1200
      };

      function resetPlayer() {
        game.player.x = 0;
        game.player.y = 0;
        game.player.speed = 0;
        game.player.health = 100;
      }

      function makeStar() {
        return {
          x: (Math.random() - 0.5) * 1200,
          y: (Math.random() - 0.5) * 700,
          z: Math.random() * 1000 + 400,
          size: 1 + Math.random() * 3,
          twinkle: Math.random() * Math.PI * 2
        };
      }

      for (let i = 0; i < 220; i++) game.stars.push(makeStar());

      function spawnObstacle() {
        const z = 500 + Math.random() * 800;
        const x = (Math.random() - 0.5) * 700;
        const y = (Math.random() - 0.5) * 450;
        const size = 20 + Math.random() * 30;
        game.obstacles.push({ x, y, z, size, spin: Math.random() * 0.04 });
      }

      function project(x, y, z) {
        const perspective = 450 / (z + 800);
        return {
          x: window.innerWidth / 2 + x * perspective,
          y: window.innerHeight / 2 + y * perspective,
          scale: perspective
        };
      }

      function update(dt) {
        game.time += dt;
        game.spawnTimer -= dt;
        if (game.spawnTimer <= 0) {
          spawnObstacle();
          game.spawnTimer = 0.35;
        }

        let moveX = 0;
        let moveY = 0;
        if (keys['arrowleft'] || keys['a']) moveX -= 1;
        if (keys['arrowright'] || keys['d']) moveX += 1;
        if (keys['arrowup'] || keys['w']) moveY -= 1;
        if (keys['arrowdown'] || keys['s']) moveY += 1;

        const len = Math.hypot(moveX, moveY) || 1;
        moveX /= len;
        moveY /= len;

        game.player.speed += moveX * 180 * dt;
        game.player.speed *= 0.97;
        game.player.speed = Math.max(-game.player.maxSpeed, Math.min(game.player.maxSpeed, game.player.speed));
        game.player.x += game.player.speed * dt * 0.35;
        game.player.y += moveY * 180 * dt;

        game.player.x = Math.max(-360, Math.min(360, game.player.x));
        game.player.y = Math.max(-220, Math.min(220, game.player.y));

        game.score += dt * 40;

        for (let i = game.obstacles.length - 1; i >= 0; i--) {
          const o = game.obstacles[i];
          o.z -= 450 * dt;
          o.x += Math.sin(game.time + i) * 0.8;
          o.y += Math.cos(game.time * 0.7 + i) * 0.4;
          o.spin += 0.01;

          const p = project(game.player.x, game.player.y, 0);
          const op = project(o.x, o.y, o.z);
          const hit = Math.abs(p.x - op.x) < 30 && Math.abs(p.y - op.y) < 22 && op.scale > 0.2;
          if (hit) {
            game.player.health -= 14;
            game.obstacles.splice(i, 1);
          }

          if (o.z < -300) game.obstacles.splice(i, 1);
        }

        for (let i = game.stars.length - 1; i >= 0; i--) {
          const s = game.stars[i];
          s.z -= 320 * dt;
          if (s.z < 100) {
            s.z = 1000 + Math.random() * 500;
            s.x = (Math.random() - 0.5) * 1200;
            s.y = (Math.random() - 0.5) * 700;
          }
        }

        if (game.player.health <= 0) {
          resetPlayer();
          game.score = 0;
          game.obstacles = [];
        }

        statusEl.textContent = `Score: ${Math.floor(game.score)} | Shield: ${Math.max(0, Math.floor(game.player.health))}%`;
        tipEl.textContent = game.player.health > 40
          ? 'Collect stars and dodge the asteroids.'
          : 'Your shield is low. Be careful!';
      }

      function drawBackground() {
        ctx.fillStyle = '#04050b';
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

        const glow = ctx.createRadialGradient(window.innerWidth * 0.5, window.innerHeight * 0.3, 10, window.innerWidth * 0.5, window.innerHeight * 0.3, 260);
        glow.addColorStop(0, 'rgba(85, 132, 255, 0.28)');
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

        game.stars.forEach((s) => {
          const p = project(s.x, s.y, s.z);
          if (p.scale <= 0) return;
          const alpha = 0.3 + 0.5 * (0.5 + 0.5 * Math.sin(game.time * 2 + s.twinkle));
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, s.size * p.scale, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawPlayer() {
        const p = project(game.player.x, game.player.y, 0);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.scale(p.scale, p.scale);

        ctx.strokeStyle = '#7ffcff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-28, 8);
        ctx.lineTo(22, 0);
        ctx.lineTo(-28, -8);
        ctx.closePath();
        ctx.stroke();

        ctx.fillStyle = '#f4f8ff';
        ctx.beginPath();
        ctx.moveTo(-20, 0);
        ctx.lineTo(16, -6);
        ctx.lineTo(8, 0);
        ctx.lineTo(16, 6);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ffca4a';
        ctx.fillRect(6, -4, 10, 8);
        ctx.restore();
      }

      function drawObstacles() {
        game.obstacles.forEach((o) => {
          const p = project(o.x, o.y, o.z);
          if (p.scale <= 0) return;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.scale(p.scale, p.scale);
          ctx.rotate(o.spin);
          ctx.fillStyle = '#9b7b54';
          ctx.beginPath();
          ctx.arc(0, 0, o.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#d8c5a0';
          ctx.beginPath();
          ctx.arc(0, 0, o.size * 0.55, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });
      }

      function draw() {
        drawBackground();
        drawObstacles();
        drawPlayer();
      }

      let last = performance.now();
      function loop(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      resetPlayer();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
