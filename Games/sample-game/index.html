<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garden Hide-and-Seek</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #7fcfff 0%, #4f8e53 100%);
        color: white;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #8fd5ff;
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .card {
        margin: 16px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(15, 18, 22, 0.78);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.16);
        box-shadow: 0 8px 24px rgba(0,0,0,0.26);
      }
      h1 { margin: 0 0 6px; font-size: 20px; }
      p { margin: 3px 0; font-size: 14px; color: #edfbff; }
      #status { align-self: flex-start; max-width: 340px; }
      #tip { align-self: flex-end; max-width: 300px; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">
      <div class="card">
        <h1>Garden Hide-and-Seek</h1>
        <p>Move with WASD or the arrow keys.</p>
        <p>Hide near the shrub or inside the shed to avoid the black cat.</p>
      </div>
      <div id="status" class="card">Objective: stay hidden.</div>
      <div id="tip" class="card">Tip: the cat loses interest when you are tucked inside cover.</div>
    </div>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const statusEl = document.getElementById('status');
      const tipEl = document.getElementById('tip');

      const W = window.innerWidth;
      const H = window.innerHeight;
      canvas.width = W * window.devicePixelRatio;
      canvas.height = H * window.devicePixelRatio;
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);

      const keys = {};
      const world = {
        width: 24,
        height: 24,
        objects: [],
        player: { x: 0, y: 0, size: 0.8 },
        cat: { x: 9, y: 9, size: 0.8 },
        hidden: false,
        catAlert: false,
        catTimer: 0,
        target: { x: 10, y: 10 }
      };

      const hideZones = [
        { name: 'the shrub', x: -7, y: -7, radius: 2.5 },
        { name: 'the shed', x: 7, y: -7, radius: 2.8 }
      ];

      function addBlock(x, y, w, h, color, z = 0) {
        world.objects.push({ x, y, w, h, color, z });
      }

      function buildScene() {
        addBlock(-11, -11, 24, 24, '#5da84b', 0);
        addBlock(-11, -11, 24, 24, '#4c7f3a', 0.08);

        addBlock(-8, 5, 4, 4, '#4a8d39');
        addBlock(8, 5, 4, 4, '#4a8d39');
        addBlock(-7, -8, 4, 4, '#5ca543');
        addBlock(7, -8, 4, 4, '#5ca543');

        addBlock(7, -8, 3.2, 2.2, '#8b6552', 0.7);
        addBlock(7, -8, 3.6, 0.8, '#c8a06b', 1.2);

        addBlock(-10, 8, 1.8, 3.6, '#5d3b24');
        addBlock(10, 8, 1.8, 3.6, '#5d3b24');
        addBlock(-10, 8, 3.3, 2.2, '#2b8f40');
        addBlock(10, 8, 3.3, 2.2, '#2b8f40');

        addBlock(-10, -3, 1.8, 3.6, '#5d3b24');
        addBlock(10, -3, 1.8, 3.6, '#5d3b24');
        addBlock(-10, -3, 3.3, 2.2, '#2b8f40');
        addBlock(10, -3, 3.3, 2.2, '#2b8f40');

        addBlock(-3, 3, 1.2, 1.2, '#7b7b7b');
        addBlock(3, 3, 1.2, 1.2, '#7b7b7b');
        addBlock(0, 7, 1.2, 1.2, '#7b7b7b');
        addBlock(-6, 1, 1.2, 1.2, '#7b7b7b');

        addBlock(-2, -2, 2.2, 2.2, '#ab6f3a');
        addBlock(2, -2, 2.2, 2.2, '#ab6f3a');
      }

      function iso(x, y, z = 0) {
        const size = 34;
        const sx = (x - y) * size + W / 2;
        const sy = (x + y) * size * 0.5 - z * 44 + H / 2 - 40;
        return { x: sx, y: sy };
      }

      function drawBlock(block) {
        const p = iso(block.x, block.y, block.z);
        const w = block.w * 34;
        const h = block.h * 34;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(w / 2, h / 4);
        ctx.lineTo(0, h / 2);
        ctx.lineTo(-w / 2, h / 4);
        ctx.closePath();
        ctx.fillStyle = block.color;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(w / 2, h / 4);
        ctx.lineTo(w / 2, h / 4 + 16);
        ctx.lineTo(0, 16);
        ctx.closePath();
        ctx.fillStyle = '#2f2f2f';
        ctx.globalAlpha = 0.18;
        ctx.fill();
        ctx.restore();
      }

      function drawGround() {
        ctx.save();
        for (let gx = -12; gx <= 12; gx += 2) {
          for (let gy = -12; gy <= 12; gy += 2) {
            const p = iso(gx, gy);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + 17, p.y + 8);
            ctx.lineTo(p.x, p.y + 16);
            ctx.lineTo(p.x - 17, p.y + 8);
            ctx.closePath();
            const shade = ((gx + gy) % 4 === 0) ? '#6dc463' : '#67b95e';
            ctx.fillStyle = shade;
            ctx.fill();
          }
        }
        ctx.restore();
      }

      function drawPath() {
        const p1 = iso(-2, 0); const p2 = iso(2, 0);
        ctx.strokeStyle = '#b48a49';
        ctx.lineWidth = 12;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y + 10);
        ctx.lineTo(p2.x, p2.y + 10);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y + 10);
        ctx.lineTo(p1.x + 70, p1.y + 35);
        ctx.stroke();
      }

      function drawPlayer() {
        const p = iso(world.player.x, world.player.y, 0.8);
        ctx.save();
        ctx.translate(p.x, p.y - 12);
        ctx.fillStyle = '#f6e9d2';
        ctx.beginPath();
        ctx.arc(0, -8, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#3a4a63';
        ctx.fillRect(-5, -2, 10, 12);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-3, 0, 2, 2);
        ctx.fillRect(1, 0, 2, 2);
        ctx.restore();
      }

      function drawCat() {
        const p = iso(world.cat.x, world.cat.y, 0.8);
        ctx.save();
        ctx.translate(p.x, p.y - 10);
        ctx.fillStyle = '#111111';
        ctx.beginPath();
        ctx.ellipse(0, 0, 10, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#222';
        ctx.fillRect(-6, -2, 12, 8);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-3, -2, 2, 2);
        ctx.fillRect(1, -2, 2, 2);
        ctx.fillStyle = '#ff8b8b';
        ctx.fillRect(5, 0, 2, 2);
        ctx.restore();
      }

      function drawHiding() {
        hideZones.forEach((zone) => {
          const p = iso(zone.x, zone.y, 0.8);
          ctx.save();
          ctx.globalAlpha = 0.18;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 34, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();
          ctx.restore();
        });
      }

      function updateStatus() {
        const nearHide = hideZones.some((zone) => Math.hypot(world.player.x - zone.x, world.player.y - zone.y) < zone.radius);
        world.hidden = nearHide;

        if (world.hidden) {
          statusEl.textContent = `Hidden safely near ${hideZones.find((zone) => Math.hypot(world.player.x - zone.x, world.player.y - zone.y) < zone.radius).name}!`;
          tipEl.textContent = 'The cat is circling away. Stay still a bit longer.';
        } else if (Math.hypot(world.player.x - world.cat.x, world.player.y - world.cat.y) < 2.2) {
          statusEl.textContent = 'The cat found you! Try another hiding spot.';
          tipEl.textContent = 'Get behind the shrub or inside the shed to escape.';
        } else if (Math.hypot(world.player.x - world.cat.x, world.player.y - world.cat.y) < 4.5) {
          statusEl.textContent = 'The cat is nearby. Find cover quickly.';
          tipEl.textContent = 'The shrub and shed are your best hiding spots.';
        } else {
          statusEl.textContent = 'Objective: stay hidden from the black cat.';
          tipEl.textContent = 'Tip: the cat loses interest when you are tucked inside cover.';
        }
      }

      function movePlayer(delta) {
        let dx = 0;
        let dy = 0;
        if (keys['w'] || keys['arrowup']) dy -= 1;
        if (keys['s'] || keys['arrowdown']) dy += 1;
        if (keys['a'] || keys['arrowleft']) dx -= 1;
        if (keys['d'] || keys['arrowright']) dx += 1;
        if (dx !== 0 || dy !== 0) {
          const len = Math.hypot(dx, dy) || 1;
          dx /= len;
          dy /= len;
          const nextX = world.player.x + dx * delta * 4.5;
          const nextY = world.player.y + dy * delta * 4.5;
          const collides = world.objects.some((o) => nextX > o.x - o.w / 2 && nextX < o.x + o.w / 2 && nextY > o.y - o.h / 2 && nextY < o.y + o.h / 2);
          if (!collides && nextX > -12 && nextX < 12 && nextY > -12 && nextY < 12) {
            world.player.x = nextX;
            world.player.y = nextY;
          }
        }
      }

      function updateCat(delta) {
        world.catTimer -= delta;
        if (world.catTimer <= 0) {
          world.target.x = Math.random() * 16 - 8;
          world.target.y = Math.random() * 16 - 8;
          world.catTimer = 1.3 + Math.random() * 1.2;
        }
        if (!world.hidden && Math.hypot(world.player.x - world.cat.x, world.player.y - world.cat.y) < 4.5) {
          world.target.x = world.player.x;
          world.target.y = world.player.y;
        }
        const dx = world.target.x - world.cat.x;
        const dy = world.target.y - world.cat.y;
        const len = Math.hypot(dx, dy) || 1;
        world.cat.x += (dx / len) * delta * 2.6;
        world.cat.y += (dy / len) * delta * 2.6;

        if (world.hidden) {
          world.cat.x += (8 - world.cat.x) * delta * 0.25;
          world.cat.y += (8 - world.cat.y) * delta * 0.25;
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        drawGround();
        drawPath();
        world.objects.forEach(drawBlock);
        drawHiding();
        drawPlayer();
        drawCat();
      }

      function frame(t) {
        const delta = Math.min(0.033, (t - (frame.last || t)) / 1000 || 0.016);
        frame.last = t;
        movePlayer(delta);
        updateCat(delta);
        updateStatus();
        draw();
        requestAnimationFrame(frame);
      }

      buildScene();
      document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
      document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
      window.addEventListener('resize', () => {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      });
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
