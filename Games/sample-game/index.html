<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garden Hide-and-Seek</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #8fd5ff 0%, #4d8f5f 100%);
        color: #fff;
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      #topbar {
        margin: 16px;
        padding: 12px 16px;
        border-radius: 12px;
        background: rgba(20, 24, 28, 0.72);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.16);
        max-width: 420px;
      }
      #topbar h1 {
        margin: 0 0 6px;
        font-size: 20px;
      }
      #topbar p {
        margin: 2px 0;
        font-size: 14px;
        color: #e7f5ff;
      }
      #status {
        margin: 16px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(17, 19, 22, 0.75);
        align-self: flex-start;
        border: 1px solid rgba(255,255,255,0.18);
        font-size: 14px;
      }
      #tip {
        margin: 16px;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(17, 19, 22, 0.7);
        align-self: flex-end;
        max-width: 280px;
        border: 1px solid rgba(255,255,255,0.16);
        font-size: 13px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="topbar">
        <h1>Garden Hide-and-Seek</h1>
        <p>Use WASD or the arrow keys to move through the garden.</p>
        <p>Hide behind the shrub or inside the little shed to escape the black cat.</p>
      </div>
      <div id="status">Objective: stay hidden.</div>
      <div id="tip">Tip: the cat loses interest when you are tucked away in cover.</div>
    </div>
    <script src="https://unpkg.com/three@0.161.0/build/three.min.js"></script>
    <script>
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x8fd5ff);
      scene.fog = new THREE.Fog(0x8fd5ff, 18, 45);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 3, 8);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xf5f0d8, 1.1);
      scene.add(ambientLight);
      const sun = new THREE.DirectionalLight(0xfff3be, 1.4);
      sun.position.set(8, 12, 6);
      scene.add(sun);
      const fill = new THREE.PointLight(0x8edfff, 18, 40, 2);
      fill.position.set(-8, 5, -8);
      scene.add(fill);

      const clock = new THREE.Clock();
      const player = new THREE.Object3D();
      player.position.set(0, 0, 0);
      scene.add(player);

      const keys = {};
      const speed = 5;
      let statusEl = document.getElementById('status');

      const worldBounds = { minX: -14, maxX: 14, minZ: -14, maxZ: 14 };
      const colliders = [];

      function makeBox(x, y, z, w, h, d, color, metalness = 0.1, roughness = 0.8) {
        const geometry = new THREE.BoxGeometry(w, h, d);
        const material = new THREE.MeshStandardMaterial({ color, metalness, roughness });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, y, z);
        scene.add(mesh);
        return mesh;
      }

      function makeGround() {
        const ground = new THREE.Mesh(
          new THREE.PlaneGeometry(40, 40),
          new THREE.MeshStandardMaterial({ color: 0x5ea548, roughness: 1, metalness: 0.05 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const border = new THREE.Mesh(
          new THREE.BoxGeometry(40, 0.3, 40),
          new THREE.MeshStandardMaterial({ color: 0x6f4b2d, roughness: 0.9 })
        );
        border.position.y = 0.15;
        border.material.transparent = true;
        border.material.opacity = 0.95;
        scene.add(border);

        const path = new THREE.Mesh(
          new THREE.BoxGeometry(8, 0.15, 2.2),
          new THREE.MeshStandardMaterial({ color: 0xa98958 })
        );
        path.position.set(0, 0.08, 0);
        scene.add(path);

        const flowerBed = new THREE.Mesh(
          new THREE.BoxGeometry(12, 0.2, 3.6),
          new THREE.MeshStandardMaterial({ color: 0x9f6f3b })
        );
        flowerBed.position.set(-8, 0.1, -6);
        scene.add(flowerBed);

        for (let i = 0; i < 18; i++) {
          const flower = new THREE.Mesh(
            new THREE.BoxGeometry(0.18, 0.7, 0.18),
            new THREE.MeshStandardMaterial({ color: [0xff6b6b, 0x3bf9ff, 0xfff06d, 0x7dff8b][i % 4] })
          );
          flower.position.set(-10 + i * 1.1, 0.35, -6.6 + (i % 2) * 0.5);
          scene.add(flower);
        }
      }

      function buildGarden() {
        makeGround();

        // Garden beds and shrubs
        makeBox(-10, 1.2, 6, 4.2, 2.4, 4.2, 0x4f9f37);
        makeBox(10, 1.2, 6, 4.2, 2.4, 4.2, 0x4f9f37);
        makeBox(-8, 1.2, -10, 3.8, 2.4, 3.8, 0x5c8f3a);
        makeBox(8, 1.2, -10, 3.8, 2.4, 3.8, 0x5c8f3a);

        // Shed
        makeBox(6.4, 1.6, -7.2, 4.4, 3.2, 3.4, 0x8b6552);
        makeBox(6.4, 3.4, -7.2, 4.6, 0.8, 3.6, 0xc8a06b);
        makeBox(6.4, 2.15, -8.9, 0.35, 1.6, 0.2, 0x6b4834);
        makeBox(6.4, 2.15, -5.55, 0.35, 1.6, 0.2, 0x6b4834);

        // Trees
        for (const [x, z] of [[-12, 10], [12, 10], [10, -2], [-10, 0]]) {
          makeBox(x, 2.3, z, 1.8, 4.6, 1.8, 0x5d3b24);
          makeBox(x, 4.8, z, 3.5, 2.5, 3.5, 0x2b8f40);
        }

        // Garden stones and planters
        for (const [x, z] of [[-3, 4], [3, 4], [0, 8], [-6, 2]]) {
          makeBox(x, 0.35, z, 0.9, 0.7, 0.9, 0x7c7c7c);
        }

        // Colliders for movement
        colliders.push(
          { x: -10, z: 6, w: 2.2, d: 2.2 },
          { x: 10, z: 6, w: 2.2, d: 2.2 },
          { x: -8, z: -10, w: 2, d: 2 },
          { x: 8, z: -10, w: 2, d: 2 },
          { x: 6.4, z: -7.2, w: 2.4, d: 1.9 },
          { x: -12, z: 10, w: 1.2, d: 1.2 },
          { x: 12, z: 10, w: 1.2, d: 1.2 },
          { x: 10, z: -2, w: 1.2, d: 1.2 },
          { x: -10, z: 0, w: 1.2, d: 1.2 }
        );
      }

      buildGarden();

      function canMoveTo(x, z) {
        if (x < worldBounds.minX || x > worldBounds.maxX || z < worldBounds.minZ || z > worldBounds.maxZ) return false;
        return !colliders.some((c) => Math.abs(x - c.x) < c.w && Math.abs(z - c.z) < c.d);
      }

      function createCat() {
        const cat = new THREE.Group();
        cat.position.set(10, 0.85, 10);
        scene.add(cat);

        const body = new THREE.Mesh(
          new THREE.BoxGeometry(1.2, 0.8, 0.7),
          new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 })
        );
        body.position.y = 0.35;
        body.position.z = 0.05;
        cat.add(body);

        const head = new THREE.Mesh(
          new THREE.BoxGeometry(0.7, 0.6, 0.7),
          new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 })
        );
        head.position.set(0.7, 0.55, 0);
        cat.add(head);

        const tail = new THREE.Mesh(
          new THREE.CylinderGeometry(0.08, 0.1, 1, 6),
          new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 })
        );
        tail.rotation.z = Math.PI / 2;
        tail.position.set(-0.6, 0.3, 0.12);
        cat.add(tail);

        const leftEar = new THREE.Mesh(
          new THREE.BoxGeometry(0.16, 0.4, 0.12),
          new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        leftEar.position.set(0.85, 0.95, 0.2);
        cat.add(leftEar);

        const rightEar = leftEar.clone();
        rightEar.position.set(0.85, 0.95, -0.2);
        cat.add(rightEar);

        const eye1 = new THREE.Mesh(
          new THREE.BoxGeometry(0.06, 0.06, 0.06),
          new THREE.MeshStandardMaterial({ color: 0xfdfdfd })
        );
        eye1.position.set(0.95, 0.58, 0.17);
        cat.add(eye1);

        const eye2 = eye1.clone();
        eye2.position.set(0.95, 0.58, -0.17);
        cat.add(eye2);

        const nose = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.06, 0.12),
          new THREE.MeshStandardMaterial({ color: 0xffb0a4 })
        );
        nose.position.set(1.08, 0.48, 0);
        cat.add(nose);

        return cat;
      }

      const cat = createCat();
      let catTarget = new THREE.Vector3(8, 0.85, -10);
      let catCooldown = 0;

      const hidingZones = [
        { name: 'the shrub', x: -8, z: -7, radius: 2.7 },
        { name: 'the shed', x: 6.4, z: -7.2, radius: 3.2 }
      ];

      let hidden = false;
      let catAlert = false;

      document.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
      });
      document.addEventListener('keyup', (e) => {
        keys[e.key.toLowerCase()] = false;
      });

      function updatePlayer(delta) {
        const move = new THREE.Vector3();
        if (keys['w'] || keys['arrowup']) move.z -= 1;
        if (keys['s'] || keys['arrowdown']) move.z += 1;
        if (keys['a'] || keys['arrowleft']) move.x -= 1;
        if (keys['d'] || keys['arrowright']) move.x += 1;

        if (move.lengthSq() > 0) {
          move.normalize();
          const nextX = player.position.x + move.x * speed * delta;
          const nextZ = player.position.z + move.z * speed * delta;
          if (canMoveTo(nextX, player.position.z)) {
            player.position.x = nextX;
          }
          if (canMoveTo(player.position.x, nextZ)) {
            player.position.z = nextZ;
          }
        }

        const targetLook = new THREE.Vector3(player.position.x, 1.2, player.position.z - 6);
        const cameraOffset = new THREE.Vector3(0, 3.4, 6.2);
        camera.position.lerp(player.position.clone().add(cameraOffset), 0.12);
        camera.lookAt(targetLook);
      }

      function updateCat(delta) {
        catCooldown -= delta;
        const distanceToPlayer = cat.position.distanceTo(player.position);

        const isInHideZone = hidingZones.some((zone) => player.position.distanceTo(new THREE.Vector3(zone.x, 0, zone.z)) < zone.radius);
        hidden = isInHideZone;

        if (catCooldown <= 0) {
          const wanderX = THREE.MathUtils.randFloat(-10, 10);
          const wanderZ = THREE.MathUtils.randFloat(-10, 10);
          catTarget.set(wanderX, 0.85, wanderZ);
          catCooldown = 1.6 + Math.random() * 1.2;
        }

        if (distanceToPlayer < 4.5 && !hidden) {
          catTarget.copy(player.position);
          catAlert = true;
        } else if (!hidden) {
          catAlert = false;
        }

        const target = hidden ? new THREE.Vector3(cat.position.x, 0.85, cat.position.z) : catTarget;
        const toTarget = new THREE.Vector3().subVectors(target, cat.position);
        if (toTarget.lengthSq() > 0.0001) {
          toTarget.y = 0;
          toTarget.normalize();
          cat.position.addScaledVector(toTarget, Math.min(delta * 3.8, 1));
          cat.lookAt(target.x, 0.9, target.z);
        }

        if (hidden) {
          cat.position.lerp(new THREE.Vector3(9, 0.85, 9), 0.02);
          cat.lookAt(player.position.x, 0.9, player.position.z);
        }

        if (hidden) {
          statusEl.textContent = 'Hidden safely behind ' + hidingZones.find((zone) => player.position.distanceTo(new THREE.Vector3(zone.x, 0, zone.z)) < zone.radius).name + '!';
        } else if (distanceToPlayer < 3.2) {
          statusEl.textContent = 'The cat found you! Try another hiding spot.';
        } else if (distanceToPlayer < 7.5) {
          statusEl.textContent = 'The cat is nearby. Find cover quickly.';
        } else {
          statusEl.textContent = 'Objective: stay hidden from the black cat.';
        }
      }

      function animate() {
        const delta = clock.getDelta();
        updatePlayer(delta);
        updateCat(delta);
        renderer.render(scene, camera);
      }

      renderer.setAnimationLoop(animate);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
